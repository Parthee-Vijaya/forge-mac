# xcodegen spec — source of truth for Stormbreaker.xcodeproj (which is gitignored).
# Regenerate with:  xcodegen generate
# Build with:       DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer \
#                     xcodebuild -project Stormbreaker.xcodeproj -scheme Stormbreaker build
name: Stormbreaker
options:
  bundleIdPrefix: pavi
  deploymentTarget:
    macOS: "26.0"
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  StormbreakerKit:
    path: StormbreakerKit

schemes:
  Stormbreaker:
    build:
      targets:
        Stormbreaker: all
        StormbreakerTests: [test]
    run:
      config: Debug
    test:
      targets:
        - StormbreakerTests
    archive:
      config: Release
  StormbreakerCompanion:
    build:
      targets:
        StormbreakerCompanion: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  Stormbreaker:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Stormbreaker
    dependencies:
      - package: StormbreakerKit
        product: StormbreakerKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pavi.Forge
        PRODUCT_NAME: Stormbreaker
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "4"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Stormbreaker/Info.plist
        CODE_SIGN_ENTITLEMENTS: Stormbreaker/Stormbreaker.entitlements
        # Ad-hoc signing so it builds/runs locally without a developer team.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        DEAD_CODE_STRIPPING: YES

  StormbreakerTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: StormbreakerTests
    dependencies:
      - target: Stormbreaker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pavi.ForgeTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Stormbreaker.app/Contents/MacOS/Stormbreaker"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""

  # B19 — iOS/iPadOS companion: thin client for the Mac's RemoteServer (:7842).
  StormbreakerCompanion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StormbreakerCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pavi.ForgeCompanion
        PRODUCT_NAME: "Stormbreaker Companion"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: StormbreakerCompanion/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        # Simulator builds need no signing; a real device would add a team later.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
